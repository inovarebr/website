<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parceiros - Inovare</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Montserrat'],
                    },
                    colors: {
                        inovare: {
                            dark: '#0f172a', /* Azul escuro corporativo do fundo */
                            cyan: '#00e5ff', /* O azul claro neon do texto "SUCESSO" */
                            text: '#475569'
                        }
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-white text-slate-800 font-sans antialiased overflow-x-hidden">

    <section class="relative pt-32 pb-40 flex flex-col items-center justify-center text-center" 
             style="background-image: url('https://images.unsplash.com/photo-1556761175-5973dc0f32e7?q=80&w=2000&auto=format&fit=crop'); 
                    background-size: cover; 
                    background-position: center;">
        
        <div class="absolute inset-0 bg-slate-900/85"></div>

        <div class="relative z-10 px-4 max-w-4xl mx-auto">
            <h2 class="text-2xl md:text-5xl font-bold text-white uppercase tracking-tight">
                NOSSOS <span class="text-inovare-cyan">PARCEIROS</span>
            </h2>
        </div>

        <div class="absolute bottom-0 left-0 w-full overflow-hidden leading-none z-20 translate-y-[1px]">
            <svg class="relative block w-full h-[100px] md:h-[140px]" viewBox="0 0 1200 120" preserveAspectRatio="none">
                <path d="M321.39,56.44c58-10.79,114.16-30.13,172-41.86,82.39-16.72,168.19-17.73,250.45-.39C823.78,31,906.67,72,985.66,92.83c70.05,18.48,146.53,26.09,214.34,3V0H0V27.35A600.21,600.21,0,0,0,321.39,56.44Z" 
                      fill="#ffffff" 
                      style="transform: rotate(180deg); transform-origin: center;"></path>
            </svg>
        </div>
    </section>

    <section class="py-12 bg-white text-center px-4 max-w-3xl mx-auto relative z-30">
        <p class="text-lg md:text-xl text-inovare-text font-light leading-relaxed">
            Descubra como empresas como a sua transformaram seus processos e alcançaram resultados extraordinários com nossas soluções e parcerias.
        </p>
    </section>

    <section class="py-16 max-w-6xl mx-auto px-4">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-8 items-center justify-items-center opacity-70 max-w-4xl mx-auto">
            <div class="flex justify-center p-8 grayscale hover:grayscale-0 transition-all duration-300 min-h-[140px]">
                <a href="https://www.oracle.com/br/" target="_blank" class="block">
                    <img src="./img/oracle-2.svg" alt="Oracle" class="max-h-32 object-contain">
                </a>
            </div>
            <div class="flex justify-center p-8 grayscale hover:grayscale-0 transition-all duration-300 min-h-[140px]">
                <a href="https://www.greentecnologia.com.br/" target="_blank" class="block">
                    <img src="./img/green (1).png" alt="Green" class="max-h-32 object-contain">
                </a>
            </div>
            <div class="flex justify-center p-8 grayscale hover:grayscale-0 transition-all duration-300 min-h-[140px]">
                <a href="https://compliancesolucoes.com.br/" target="_blank" class="block">
                    <img src="./img/csf (1).png" alt="CSF" class="max-h-32 object-contain">
                </a>
            </div>
            <div class="flex justify-center p-8 grayscale hover:grayscale-0 transition-all duration-300 min-h-[140px]">
                <a href="https://kamino.com.br/" target="_blank" class="block">
                    <img src="./img/logoKamino.png" alt="Kamino" class="max-h-32 object-contain">
                </a>
            </div>
        </div>
    </section>

    <section class="py-20 bg-slate-50 border-t border-slate-100">
        <div class="max-w-3xl mx-auto px-4">
            <div class="text-center mb-10">
                <h2 class="text-3xl font-bold text-slate-900 mb-4 uppercase tracking-tight">Faça parte do <span class="text-inovare-cyan">ecossistema</span></h2>
                <p class="text-inovare-text">Preencha o formulário abaixo e nossa equipe comercial entrará em contato.</p>
            </div>

            <div class="bg-white shadow-xl rounded-xl p-8 md:p-10 border border-slate-100">
                <form action="#" method="POST" class="space-y-6">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div>
                            <label for="nome" class="block text-sm font-semibold text-slate-700 mb-1">Nome Completo</label>
                            <input type="text" id="nome" name="nome" required class="w-full px-4 py-3 rounded-md border border-slate-300 focus:ring-2 focus:ring-inovare-cyan focus:border-inovare-cyan bg-slate-50 focus:bg-white transition-colors outline-none">
                        </div>
                        <div>
                            <label for="empresa" class="block text-sm font-semibold text-slate-700 mb-1">Empresa</label>
                            <input type="text" id="empresa" name="empresa" required class="w-full px-4 py-3 rounded-md border border-slate-300 focus:ring-2 focus:ring-inovare-cyan focus:border-inovare-cyan bg-slate-50 focus:bg-white transition-colors outline-none">
                        </div>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div>
                            <label for="email" class="block text-sm font-semibold text-slate-700 mb-1">E-mail Corporativo</label>
                            <input type="email" id="email" name="email" required class="w-full px-4 py-3 rounded-md border border-slate-300 focus:ring-2 focus:ring-inovare-cyan focus:border-inovare-cyan bg-slate-50 focus:bg-white transition-colors outline-none">
                        </div>
                        <div>
                            <label for="telefone" class="block text-sm font-semibold text-slate-700 mb-1">Telefone / WhatsApp</label>
                            <input type="tel" id="telefone" name="telefone" class="w-full px-4 py-3 rounded-md border border-slate-300 focus:ring-2 focus:ring-inovare-cyan focus:border-inovare-cyan bg-slate-50 focus:bg-white transition-colors outline-none">
                        </div>
                    </div>

                    <div>
                        <label for="mensagem" class="block text-sm font-semibold text-slate-700 mb-1">Como podemos somar forças?</label>
                        <textarea id="mensagem" name="mensagem" rows="4" required class="w-full px-4 py-3 rounded-md border border-slate-300 focus:ring-2 focus:ring-inovare-cyan focus:border-inovare-cyan bg-slate-50 focus:bg-white transition-colors outline-none resize-none"></textarea>
                    </div>

                    <div class="text-center pt-2">
                        <button type="submit" class="inline-flex justify-center items-center px-10 py-4 border border-transparent text-sm font-bold uppercase tracking-wider rounded text-slate-900 bg-inovare-cyan hover:bg-[#00cce6] focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-inovare-cyan shadow-lg transition-colors duration-300 w-full md:w-auto">
                            Quero Ser Parceiro
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </section>

</body>
</html>
