<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parceiros - Inovare</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Montserrat'],
                    },
                    colors: {
                        inovare: {
                            dark: '#0f172a', /* Azul escuro corporativo do fundo */
                            cyan: '#00e5ff', /* O azul claro neon do texto "SUCESSO" */
                            text: '#475569'
                        }
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-white text-slate-800 font-sans antialiased overflow-x-hidden">

<!-- AIRDOC TÍTULO -->

<style>
.banner {
  display: flex;
  align-items: center;   
  justify-content: center; 
  min-height: 100vh;      
  background: #2c3e50;
  color: white;
  animation: slideDownBanner 0.8s ease-out;
}

@keyframes slideDownBanner {
  0% {
    opacity: 0;
    transform: translateY(-50px);
  }
  100% {
    opacity: 1;
    transform: translateY(0);
  }
}

/* Estilo adicional para o botão saiba mais */
.btn-saiba-mais {
  transition: all 0.3s ease;
  border: 1px solid #00FFFF;
}

.btn-saiba-mais:hover {
  background-color: #00FFFF;
  color: #17152C;
  box-shadow: 0 0 15px rgba(0, 255, 255, 0.4);
}
</style>

<section id="consultoria-essencia" class="banner py-32 bg-[#17152C] overflow-hidden flex items-center justify-center relative">
    
        <div class="absolute inset-0 z-0">
        <img src="./img/parceiros.jpg" alt="Nossos Parceiros Inovare" class="w-full h-full object-cover object-center">
        
        <div class="absolute inset-0 bg-gradient-to-r from-[#17152C]/90 via-[#00FFFF]/20 to-[#17152C]/90 mix-blend-multiply"></div>
        <div class="absolute inset-0 bg-[#17152C]/60"></div> 
    </div>

    <div class="max-w-7xl mx-auto px-6 relative z-10 text-center" data-aos="fade-down">
    <h2 class="text-2xl md:text-5xl font-bold text-white uppercase tracking-tight mb-8" data-aos="zoom-in" data-aos-delay="200">
        NOSSOS<span style="color: #00FFFF;"> PARCEIROS</span>
    </h2>

    </div>

</section>





<!-- DIVIDE SHAPER-->


<style>.custom-shape-divider-bottom-1772461233 {
    position: absolute;
    bottom: 0;
    left: 0;
    width: 100%;
    overflow: hidden;
    line-height: 0;
    transform: rotate(180deg);
}

.custom-shape-divider-bottom-1772461233 svg {
    position: relative;
    display: block;
    width: calc(100% + 1.3px);
    height: 81px;
}

.custom-shape-divider-bottom-1772461233 .shape-fill {
    fill: #FFFFFF;
}</style>


<div class="custom-shape-divider-bottom-1772461233">
    <svg data-name="Layer 1" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 120" preserveAspectRatio="none">
        <path d="M321.39,56.44c58-10.79,114.16-30.13,172-41.86,82.39-16.72,168.19-17.73,250.45-.39C823.78,31,906.67,72,985.66,92.83c70.05,18.48,146.53,26.09,214.34,3V0H0V27.35A600.21,600.21,0,0,0,321.39,56.44Z" class="shape-fill"></path>
    </svg>
</div>



    <section class="py-12 bg-white text-center px-4 max-w-3xl mx-auto relative z-30">
        <p class="text-lg md:text-xl text-inovare-text font-light leading-relaxed">
            Descubra como empresas como a sua transformaram seus processos e alcançaram resultados extraordinários com nossas soluções e parcerias.
        </p>
    </section>

    <section class="py-16 max-w-6xl mx-auto px-4">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-8 items-center justify-items-center max-w-4xl mx-auto">
            <div class="flex justify-center p-8 grayscale hover:grayscale-0 transition-all duration-300 min-h-[140px]">
                <a href="https://www.oracle.com/br/" target="_blank" class="block">
                    <img src="./img/oracle-2.svg" alt="Oracle" class="max-h-32 object-contain">
                </a>
            </div>
            <div class="flex justify-center p-8 grayscale hover:grayscale-0 transition-all duration-300 min-h-[140px]">
                <a href="https://www.greentecnologia.com.br/" target="_blank" class="block">
                    <img src="./img/green (1).png" alt="Green" class="max-h-32 object-contain">
                </a>
            </div>
            <div class="flex justify-center p-8 grayscale hover:grayscale-0 transition-all duration-300 min-h-[140px]">
                <a href="https://compliancesolucoes.com.br/" target="_blank" class="block">
                    <img src="./img/csf (1).png" alt="CSF" class="max-h-32 object-contain">
                </a>
            </div>
            <div class="flex justify-center p-8 grayscale hover:grayscale-0 transition-all duration-300 min-h-[140px]">
                <a href="https://kamino.com.br/" target="_blank" class="block">
                    <img src="./img/logoKamino.png" alt="Kamino" class="max-h-32 object-contain">
                </a>
            </div>
        </div>
    </section>

    <section class="py-20 bg-white border-t border-slate-100">
        <div class="max-w-3xl mx-auto px-4">
            <div class="text-center mb-10">
            </div>

            <div class="relative overflow-hidden rounded-[40px] bg-white p-1 shadow-[0_30px_90px_-35px_rgba(15,23,42,0.15)]">
                <div class="relative overflow-hidden rounded-[36px] bg-white border border-slate-200 shadow-[0_20px_60px_-30px_rgba(15,23,42,0.08)]">
                    <div class="absolute -left-10 top-8 h-40 w-40 rounded-full bg-inovare-cyan/20 blur-3xl"></div>
                    <div class="absolute -right-10 bottom-8 h-48 w-48 rounded-full bg-inovare-cyan/10 blur-3xl"></div>
                    <div class="relative p-8 md:p-10">
                        <div class="space-y-4 text-left">
             <h2 class="text-3xl font-bold text-slate-900 mb-4 uppercase tracking-tight">Faça parte do <span class="text-inovare-cyan">ecossistema</span></h2>
                <p class="text-inovare-text">Preencha o formulário abaixo e nossa equipe comercial entrará em contato.</p>
                        </div>

                        <form action="#" method="POST" class="space-y-6 mt-8">
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                                <div>
                                    <label for="nome" class="block text-sm font-semibold text-slate-700 mb-1">Nome Completo</label>
                                    <input type="text" id="nome" name="nome" required class="w-full px-4 py-3 rounded-3xl border border-slate-200 bg-slate-50 text-slate-900 focus:ring-2 focus:ring-inovare-cyan focus:border-inovare-cyan transition duration-300 outline-none">
                                </div>
                                <div>
                                    <label for="empresa" class="block text-sm font-semibold text-slate-700 mb-1">Empresa</label>
                                    <input type="text" id="empresa" name="empresa" required class="w-full px-4 py-3 rounded-3xl border border-slate-200 bg-slate-50 text-slate-900 focus:ring-2 focus:ring-inovare-cyan focus:border-inovare-cyan transition duration-300 outline-none">
                                </div>
                            </div>

                            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                                <div>
                                    <label for="email" class="block text-sm font-semibold text-slate-700 mb-1">E-mail Corporativo</label>
                                    <input type="email" id="email" name="email" required class="w-full px-4 py-3 rounded-3xl border border-slate-200 bg-slate-50 text-slate-900 focus:ring-2 focus:ring-inovare-cyan focus:border-inovare-cyan transition duration-300 outline-none">
                                </div>
                                <div>
                                    <label for="telefone" class="block text-sm font-semibold text-slate-700 mb-1">Telefone / WhatsApp</label>
                                    <input type="tel" id="telefone" name="telefone" class="w-full px-4 py-3 rounded-3xl border border-slate-200 bg-slate-50 text-slate-900 focus:ring-2 focus:ring-inovare-cyan focus:border-inovare-cyan transition duration-300 outline-none">
                                </div>
                            </div>

                            <div>
                                <label for="mensagem" class="block text-sm font-semibold text-slate-700 mb-1">Como podemos somar forças?</label>
                                <textarea id="mensagem" name="mensagem" rows="4" required class="w-full px-4 py-3 rounded-3xl border border-slate-200 bg-slate-50 text-slate-900 focus:ring-2 focus:ring-inovare-cyan focus:border-inovare-cyan transition duration-300 outline-none resize-none"></textarea>
                            </div>

                            <div class="text-center pt-2">
                                <button type="submit" class="inline-flex justify-center items-center px-10 py-4 rounded-full bg-gradient-to-r from-inovare-cyan via-[#86f7ff] to-[#b8ffff] text-slate-950 font-bold uppercase tracking-[0.16em] shadow-[0_20px_60px_-30px_rgba(0,229,255,0.65)] hover:from-[#00d4ff] hover:to-[#64f0ff] focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-inovare-cyan transition-all duration-300 w-full md:w-auto">
                                    Quero Ser Parceiro
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </section>

</body>
</html>
